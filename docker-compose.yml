version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hamrosavings-db
    environment:
      POSTGRES_USER: vussan
      POSTGRES_PASSWORD: P@ssw0rd
      POSTGRES_DB: hamrosavings
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vussan -d hamrosavings"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
